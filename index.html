<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DITHERCAM // live feed processor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #C7C0AF;
    --panel: #D8D2C4;
    --panel-alt: #CDC6B5;
    --line: #B0A88F;
    --line-strong: #8A8268;
    --phosphor: #4FE38A;
    --phosphor-dim: #2f6b4c;
    --screen-bg: #06110a;
    --accent: #E08A3C;
    --led-green: #5BAE6E;
    --led-red: #D9534F;
    --text: #2A2822;
    --text-dim: #6B6350;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; background:#000; color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing:antialiased;
    height:100%; overflow:hidden;
  }
  body{
    position:relative; width:100%; height:100dvh;
  }

  /* mobile-first: hidden chrome, full-bleed camera app */
  .brand, .subhead, .foot{ display:none; }

  .layout{ display:block; width:100%; height:100%; }

  .monitor-wrap{
    position:fixed; inset:0; z-index:1; background:#000;
  }
  .monitor{
    position:relative; width:100%; height:100%;
    background:#000; border:none; border-radius:0; padding:0; box-shadow:none;
  }
  .monitor::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode:multiply;
  }
  .screen{ position:relative; width:100%; height:100%; border-radius:0; overflow:hidden; background:#000; }
  .statusbar{
    position:absolute; top:0; left:0; right:0; z-index:2;
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 14px; font-size:10px; letter-spacing:0.5px;
    color:var(--phosphor); border:none;
    background:linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  }
  .statusbar .rec{ display:flex; align-items:center; gap:6px; color:rgba(79,227,138,0.6); }
  .statusbar .rec .dot{
    width:7px; height:7px; border-radius:50%; background:var(--led-green);
    transition:background .2s;
  }
  .statusbar.is-recording .rec .dot{
    background:var(--led-red); box-shadow:0 0 6px var(--led-red);
    animation:blink 1s steps(2) infinite;
  }
  .statusbar.is-recording .rec{ color:var(--led-red); }
  @keyframes blink{ 50%{ opacity:0.25; } }

  canvas#glcanvas{ display:block; width:100%; height:100%; object-fit:cover; background:#000; }
  .fx-overlay{ position:absolute; inset:0; pointer-events:none; z-index:4; overflow:hidden; }
  .ov{ position:absolute; inset:0; }

  /* DOTMATRIX overlay */
  .dm-circle{ position:absolute; width:110px; height:110px; border:2px solid #2E6FEA; border-radius:50%; top:16%; left:58%; }
  .dm-bracket{ position:absolute; width:20px; height:20px; }
  .dm-bracket.tl{ top:14px; left:14px; border-top:2px solid #2E6FEA; border-left:2px solid #2E6FEA; }
  .dm-bracket.tr{ top:14px; right:14px; border-top:2px solid #2E6FEA; border-right:2px solid #2E6FEA; }
  .dm-bracket.bl{ bottom:14px; left:14px; border-bottom:2px solid #2E6FEA; border-left:2px solid #2E6FEA; }
  .dm-bracket.br{ bottom:14px; right:14px; border-bottom:2px solid #2E6FEA; border-right:2px solid #2E6FEA; }
  .dm-label{ position:absolute; bottom:14px; left:14px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; color:#2E6FEA; text-transform:uppercase; }

  /* PIXELZINE overlay */
  .pz-sparkle{ position:absolute; color:#fff; font-size:18px; text-shadow:0 0 6px #fff; }
  .pz-dialogue{
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    background:#000; color:#fff; border:2px solid #fff; padding:8px 14px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; max-width:80%; text-align:center;
  }

  /* ADVGAME overlay */
  .ag-menubar{
    position:absolute; top:0; left:0; right:0; background:#fff; color:#000;
    font-family:'IBM Plex Mono',monospace; font-size:10px; padding:5px 8px;
    border-bottom:1px solid #000; letter-spacing:0.5px;
  }
  .ag-narrative{
    position:absolute; bottom:0; left:0; right:0; background:#000; color:#fff;
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:8px 10px; border-top:1px solid #fff;
  }

  /* DISCOELY overlay */
  .de-stats{
    position:absolute; top:14px; right:14px; background:#E8DCC0; color:#000;
    font-family:'IBM Plex Mono',monospace; font-size:10px; padding:8px 10px;
    border-left:3px solid #C03020; line-height:1.7;
  }
  .de-stats .v{ color:#C03020; font-weight:700; margin-left:4px; }
  .de-eventlog{
    position:absolute; bottom:14px; left:14px; background:rgba(0,0,0,0.7); color:#E8DCC0;
    font-family:'IBM Plex Mono',monospace; font-size:10px; padding:6px 10px;
  }

  .placeholder{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; text-align:center; padding:30px;
    font-size:11px; color:var(--phosphor-dim); z-index:3; background:var(--screen-bg);
  }
  .placeholder button{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:11px; letter-spacing:0.5px;
    background:var(--accent); border:1px solid var(--accent); color:#1a0f04;
    padding:10px 18px; border-radius:4px; cursor:pointer; text-transform:uppercase;
  }
  .placeholder button:hover{ opacity:0.85; }

  /* console: on mobile this is an invisible positioning wrapper; real content floats */
  .console{
    position:fixed; inset:0; z-index:10; pointer-events:none;
    background:none; border:none; padding:0; width:auto; max-height:none; overflow:visible;
  }
  .always-visible{ pointer-events:none; }
  .section-label{
    font-family:'Oswald', sans-serif; font-weight:600;
    font-size:10px; letter-spacing:1.5px; color:var(--text-dim);
    text-transform:uppercase; margin:0 0 8px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after{ content:''; flex:1; height:1px; background:var(--line); }
  .preset-label{ display:none; }

  /* preset dropdown trigger hidden on mobile (fab handles it); list floats */
  .preset-dropdown{ position:static; }
  .preset-current{ display:none; }
  .preset-list{
    display:none; position:fixed; right:14px; bottom:120px; left:auto; z-index:20;
    width:min(240px, calc(100vw - 90px));
    background:rgba(216,210,196,0.95); backdrop-filter:blur(8px);
    border:1px solid var(--line-strong); border-radius:10px;
    max-height:50vh; overflow-y:auto; pointer-events:auto;
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.45);
  }
  .preset-dropdown.open .preset-list{ display:block; }
  .preset-btn{
    display:block; width:100%; text-align:left;
    font-family:inherit; font-size:11px; letter-spacing:0.3px;
    background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--text-dim);
    padding:11px 14px; cursor:pointer; text-transform:uppercase;
    transition:background .1s, color .1s;
  }
  .preset-list .preset-btn:last-child{ border-bottom:none; }
  .preset-btn:hover{ background:rgba(224,138,60,0.12); color:var(--text); }
  .preset-btn.active{ color:var(--accent); font-weight:600; }

  /* action buttons: mobile = floating shutter bar bottom-center */
  .actions{
    position:fixed; left:0; right:0; bottom:26px; z-index:20;
    display:flex; justify-content:center; align-items:center; gap:22px;
    pointer-events:none;
  }
  .actions button{
    pointer-events:auto;
    width:58px; height:58px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald', sans-serif; font-size:22px;
    background:rgba(216,210,196,0.92); backdrop-filter:blur(6px);
    border:1px solid var(--line-strong); color:var(--text); cursor:pointer;
  }
  .actions .btn-label{ display:none; }
  #captureBtn{ width:72px; height:72px; }
  #captureBtn .icon{ width:28px; height:28px; }
  #recordBtn.active{ border-color:var(--led-red); color:var(--led-red); background:rgba(217,83,79,0.18); }

  /* floating category panels (pattern / adjust / color) */
  .panel-section{
    display:none; position:fixed; right:14px; bottom:120px; z-index:20;
    width:min(260px, calc(100vw - 90px)); max-height:50vh; overflow-y:auto;
    background:rgba(216,210,196,0.95); backdrop-filter:blur(8px);
    border:1px solid var(--line-strong); border-radius:10px; padding:14px;
    pointer-events:auto; box-shadow:0 12px 30px -10px rgba(0,0,0,0.45);
  }
  .panel-section.open{ display:block; }

  .row{ display:flex; align-items:center; gap:12px; margin-bottom:11px; }
  .row label{ font-family:'Oswald', sans-serif; font-size:10px; color:var(--text-dim); width:82px; flex-shrink:0; text-transform:uppercase; letter-spacing:0.4px; }
  .row .val{ font-size:10px; color:var(--accent); width:30px; text-align:right; flex-shrink:0; }
  input[type=range]{
    -webkit-appearance:none; flex:1; height:3px; background:var(--line-strong); outline:none; border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); cursor:pointer; box-shadow:0 1px 4px rgba(42,40,34,0.4);
    border:2px solid #1a0f04;
  }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid #1a0f04;
  }

  .pattern-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .pattern-btn{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:9px; letter-spacing:0.3px;
    background:var(--panel-alt); border:1px solid var(--line); color:var(--text-dim);
    padding:9px 4px; border-radius:5px; cursor:pointer; text-transform:uppercase;
  }
  .pattern-btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(224,138,60,0.1); }

  .color-row{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .swatch{ display:flex; align-items:center; gap:8px; }
  .swatch label{ font-family:'Oswald', sans-serif; font-size:10px; color:var(--text-dim); text-transform:uppercase; }
  .swatch input[type=color]{
    width:28px; height:28px; border:1px solid var(--line-strong); border-radius:5px; background:none; cursor:pointer; padding:0;
  }
  .mode-toggle{ display:flex; gap:8px; flex-wrap:wrap; }
  .mode-toggle button{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:9px; background:var(--panel-alt); border:1px solid var(--line);
    color:var(--text-dim); padding:7px 10px; border-radius:5px; cursor:pointer; text-transform:uppercase;
  }
  .mode-toggle button.active{ border-color:var(--accent); color:var(--accent); }

  /* floating fab stack (mobile only) */
  .fab-stack{
    position:fixed; right:14px; top:50%; transform:translateY(-50%); z-index:20;
    display:flex; flex-direction:column; gap:12px; pointer-events:auto;
  }
  .icon{
    width:20px; height:20px; stroke:currentColor; stroke-width:2.25;
    fill:none; stroke-linecap:round; stroke-linejoin:round; display:block;
  }
  .icon-rec-stop{ display:none; }
  #recordBtn.active .icon-rec-dot{ display:none; }
  #recordBtn.active .icon-rec-stop{ display:block; }

  .fab-btn{
    width:44px; height:44px; border-radius:50%;
    background:rgba(216,210,196,0.9); backdrop-filter:blur(6px);
    border:1px solid var(--line-strong); color:var(--text);
    font-size:17px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .fab-btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(224,138,60,0.2); }

  @media (min-width: 768px){
    html,body{ overflow-y:auto; overflow-x:hidden; height:auto; }
    body{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; padding:16px;
      background:var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(224,138,60,0.08), transparent 60%);
    }
    .brand, .subhead, .foot{ display:block; }
    .brand{
      font-family:'Oswald', sans-serif; font-weight:700;
      font-size:19px; letter-spacing:1px; color:var(--text); margin-bottom:0;
    }
    .brand span{ color:var(--accent); }
    .subhead{
      font-family:'Oswald', sans-serif; font-size:10px; color:var(--text-dim);
      letter-spacing:1.5px; margin-bottom:10px; text-transform:uppercase;
    }
    .foot{ margin-top:8px; font-size:9px; color:var(--text-dim); text-align:center; max-width:900px; line-height:1.4; white-space:nowrap; }
    .foot b{ color:var(--text); }

    .layout{
      display:flex; flex-direction:row; align-items:stretch; width:100%; max-width:1160px; gap:18px; height:auto;
    }
    .monitor-wrap{
      position:static; flex:1 1 auto; min-width:0; background:transparent; z-index:auto;
      display:flex; align-items:center;
    }
    .monitor{
      width:100%; height:auto;
      background:#2A2822; border:3px solid var(--line-strong); border-radius:14px;
      padding:8px; box-shadow:0 20px 50px -20px rgba(42,40,34,0.45);
    }
    .monitor::after{ inset:8px; border-radius:6px; }
    .screen{ width:auto; height:auto; border-radius:6px; }
    canvas#glcanvas{ width:100%; height:auto; aspect-ratio:16/9; object-fit:cover; }
    .statusbar{
      position:relative; padding:8px 12px;
      background:var(--screen-bg); border-bottom:1px solid rgba(79,227,138,0.15);
    }
    .statusbar .rec{ color:var(--phosphor-dim); }

    .console{
      position:static; pointer-events:auto; z-index:auto;
      background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px;
      flex:0 0 360px; max-height:calc(100vh - 32px); overflow-y:auto;
    }
    .always-visible{ pointer-events:auto; }
    .preset-label{ display:flex; }
    .preset-dropdown{ position:relative; margin-bottom:14px; }
    .preset-current{
      display:flex; width:100%; align-items:center; justify-content:space-between;
      font-family:'Oswald', sans-serif; font-weight:600; font-size:12px; letter-spacing:0.5px;
      background:var(--panel-alt); border:1px solid var(--line-strong); color:var(--text);
      padding:12px 14px; border-radius:6px; cursor:pointer; text-transform:uppercase;
    }
    .preset-current .chevron{ color:var(--accent); transition:transform .15s; }
    .preset-dropdown.open .preset-current .chevron{ transform:rotate(180deg); }
    .preset-list{
      position:absolute; top:calc(100% + 6px); right:auto; bottom:auto; left:0;
      width:100%;
    }

    .actions{
      position:static; display:flex; gap:10px; margin-top:12px; justify-content:flex-start;
    }
    .actions button{
      pointer-events:auto; flex:1; width:auto; height:auto; border-radius:6px;
      font-family:'Oswald', sans-serif; font-weight:600; font-size:11px; letter-spacing:0.5px;
      padding:12px; background:var(--panel-alt); border:1px solid var(--line-strong); color:var(--text);
      backdrop-filter:none;
    }
    .actions button:hover{ border-color:var(--accent); }
    .actions .btn-label{ display:inline; margin-left:6px; }
    #captureBtn{ width:auto; height:auto; }
    #captureBtn .icon{ width:20px; height:20px; }

    .panel-section{
      display:block; position:static; width:auto; max-height:none; overflow:visible;
      background:none; backdrop-filter:none; border:none; border-radius:0; padding:0;
      box-shadow:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    }

    .fab-stack{ display:none; }
  }
</style>
</head>
<body>

  <div class="brand">DITHER<span>CAM</span></div>
  <div class="subhead">live feed / pattern processor</div>

  <div class="layout">
    <div class="monitor-wrap">
      <div class="monitor" id="monitor">
        <div class="screen">
          <div class="statusbar" id="statusbar">
            <span id="clock">00:00:00</span>
            <div class="rec"><div class="dot"></div><span id="recLabel">STANDBY</span></div>
          </div>
          <canvas id="glcanvas"></canvas>
          <div class="fx-overlay" id="fxOverlay"></div>
          <div class="placeholder" id="placeholder">
            <div>NO SIGNAL<br>camera access required</div>
            <button id="startBtn">Enable Camera</button>
          </div>
        </div>
      </div>
    </div>

    <div class="console">
      <div class="always-visible">
        <div class="section-label preset-label">Preset</div>
        <div class="preset-dropdown" id="presetDropdown">
          <button class="preset-current" id="presetCurrentBtn" type="button">
            <span id="presetCurrentLabel">Matrix Term</span>
            <span class="chevron">▾</span>
          </button>
          <div class="preset-list" id="presets"></div>
        </div>
        <div class="actions" id="actionsBar">
          <button id="captureBtn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg>
            <span class="btn-label">Capture PNG</span>
          </button>
          <button id="recordBtn">
            <svg class="icon icon-rec-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="currentColor" stroke="none"/></svg>
            <svg class="icon icon-rec-stop" viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1" fill="currentColor" stroke="none"/></svg>
            <span class="btn-label">Record WebM</span>
          </button>
        </div>
      </div>

      <div class="panel-section" id="panelPattern">
        <div class="section-label">Pattern</div>
        <div class="pattern-grid" id="patternGrid"></div>
      </div>

      <div class="panel-section" id="panelAdjust">
        <div class="section-label">Parameters</div>
        <div class="row">
          <label>Cell Size</label>
          <input type="range" id="cellSize" min="2" max="16" step="1" value="6">
          <span class="val" id="cellSizeVal">6</span>
        </div>
        <div class="row">
          <label>Threshold</label>
          <input type="range" id="threshold" min="-50" max="50" step="1" value="0">
          <span class="val" id="thresholdVal">0</span>
        </div>
        <div class="row">
          <label>Matrix</label>
          <input type="range" id="matrixSize" min="0" max="2" step="1" value="1">
          <span class="val" id="matrixSizeVal">4x4</span>
        </div>
      </div>

      <div class="panel-section" id="panelColor">
        <div class="section-label">Color</div>
        <div class="color-row">
          <div class="swatch">
            <label>FG</label>
            <input type="color" id="fgColor" value="#6fffb0">
          </div>
          <div class="swatch">
            <label>BG</label>
            <input type="color" id="bgColor" value="#050605">
          </div>
          <div class="mode-toggle">
            <button data-mode="0" class="active">Mono</button>
            <button data-mode="1">RGB Split</button>
            <button data-mode="2">Multi</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="fab-stack" id="fabStack">
    <button class="fab-btn" id="fabPreset" title="Preset" type="button">
      <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="fab-btn" id="fabPattern" title="Pattern" type="button">
      <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="10.67" x2="20" y2="10.67"/><line x1="4" y1="17.33" x2="20" y2="17.33"/><line x1="10.67" y1="4" x2="10.67" y2="20"/><line x1="17.33" y1="4" x2="17.33" y2="20"/></svg>
    </button>
    <button class="fab-btn" id="fabAdjust" title="Adjust" type="button">
      <svg class="icon" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="11" cy="17" r="2" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="fab-btn" id="fabColor" title="Color" type="button">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="fab-btn" id="flipCameraBtn" title="Flip Camera" type="button">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3"/><polyline points="18 4 18 7 15 7"/><polyline points="6 20 6 17 9 17"/></svg>
    </button>
  </div>

  <div class="foot">
    Runs fully local — nothing leaves your browser.
  </div>

<script>
(function(){
  const glcanvas = document.getElementById('glcanvas');
  const video = document.createElement('video');
  video.playsInline = true; video.muted = true; video.autoplay = true;
  const placeholder = document.getElementById('placeholder');
  const startBtn = document.getElementById('startBtn');
  const statusbar = document.getElementById('statusbar');
  const recLabel = document.getElementById('recLabel');
  const clockEl = document.getElementById('clock');

  let gl, program, texture, glyphTexture, uniforms;
  let streamReady = false;

  // ---------- clock ----------
  function tickClock(){

  // ---------- WebGL ----------
  const VERT_SRC = `#version 300 es
    in vec2 aPos;
    out vec2 vUv;
    void main(){
      vUv = vec2((aPos.x+1.0)/2.0, 1.0-(aPos.y+1.0)/2.0);
      gl_Position = vec4(aPos, 0.0, 1.0);
    }
  `;

  const FRAG_SRC = `#version 300 es
    precision mediump float;
    in vec2 vUv;
    out vec4 outColor;
    uniform sampler2D uTex;
    uniform sampler2D uGlyphTex;
    uniform vec2 uResolution;
    uniform float uCellSize;
    uniform float uThreshold;
    uniform int uMatrixIdx;
    uniform int uPattern;
    uniform int uColorMode;
    uniform vec3 uFg;
    uniform vec3 uBg;
    uniform float uTime;
    uniform vec3 uPalette[4];
    uniform int uPaletteCount;

    float bayer2(vec2 p){
      mat2 m = mat2(0.0,2.0,3.0,1.0);
      int x = int(mod(p.x,2.0)); int y = int(mod(p.y,2.0));
      float vals[4]; vals[0]=0.0; vals[1]=2.0; vals[2]=3.0; vals[3]=1.0;
      return vals[y*2+x]/4.0;
    }
    float bayer4(vec2 p){
      float m[16];
      m[0]=0.0;  m[1]=8.0;  m[2]=2.0;  m[3]=10.0;
      m[4]=12.0; m[5]=4.0;  m[6]=14.0; m[7]=6.0;
      m[8]=3.0;  m[9]=11.0; m[10]=1.0; m[11]=9.0;
      m[12]=15.0;m[13]=7.0; m[14]=13.0;m[15]=5.0;
      int x = int(mod(p.x,4.0)); int y = int(mod(p.y,4.0));
      return m[y*4+x]/16.0;
    }
    float bayer8(vec2 p){
      float m[64];
      m[0]=0.0;m[1]=32.0;m[2]=8.0;m[3]=40.0;m[4]=2.0;m[5]=34.0;m[6]=10.0;m[7]=42.0;
      m[8]=48.0;m[9]=16.0;m[10]=56.0;m[11]=24.0;m[12]=50.0;m[13]=18.0;m[14]=58.0;m[15]=26.0;
      m[16]=12.0;m[17]=44.0;m[18]=4.0;m[19]=36.0;m[20]=14.0;m[21]=46.0;m[22]=6.0;m[23]=38.0;
      m[24]=60.0;m[25]=28.0;m[26]=52.0;m[27]=20.0;m[28]=62.0;m[29]=30.0;m[30]=54.0;m[31]=22.0;
      m[32]=3.0;m[33]=35.0;m[34]=11.0;m[35]=43.0;m[36]=1.0;m[37]=33.0;m[38]=9.0;m[39]=41.0;
      m[40]=51.0;m[41]=19.0;m[42]=59.0;m[43]=27.0;m[44]=49.0;m[45]=17.0;m[46]=57.0;m[47]=25.0;
      m[48]=15.0;m[49]=47.0;m[50]=7.0;m[51]=39.0;m[52]=13.0;m[53]=45.0;m[54]=5.0;m[55]=37.0;
      m[56]=63.0;m[57]=31.0;m[58]=55.0;m[59]=23.0;m[60]=61.0;m[61]=29.0;m[62]=53.0;m[63]=21.0;
      int x = int(mod(p.x,8.0)); int y = int(mod(p.y,8.0));
      return m[y*8+x]/64.0;
    }

    float ditherThreshold(vec2 cellPos){
      if(uMatrixIdx==0) return bayer2(cellPos);
      if(uMatrixIdx==1) return bayer4(cellPos);
      return bayer8(cellPos);
    }

    float halftoneThreshold(vec2 uvPix, float lum){
      float size = uMatrixIdx==0 ? 4.0 : (uMatrixIdx==1 ? 8.0 : 16.0);
      vec2 cell = mod(uvPix, size) - size*0.5;
      float dist = length(cell) / (size*0.5);
      return lum > (1.0-dist) ? 1.0 : 0.0;
    }

    float lineThreshold(vec2 uvPix, float lum){
      float spacing = uMatrixIdx==0 ? 3.0 : (uMatrixIdx==1 ? 5.0 : 8.0);
      float phase = mod(uvPix.x + uvPix.y, spacing) / spacing;
      return lum > phase ? 1.0 : 0.0;
    }

    float rand(vec2 co){
      return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453);
    }
    float noiseThreshold(vec2 uvPix, float lum){
      float n = rand(uvPix + floor(uTime*6.0));
      return lum > n ? 1.0 : 0.0;
    }

    float contourThreshold(vec2 uvPix, float lumBase){
      float spacing = uMatrixIdx==0 ? 10.0 : (uMatrixIdx==1 ? 6.0 : 3.5);
      float amplitude = spacing * 1.8;
      float bandIndex = floor(uvPix.y / spacing);
      float bandCenterY = (bandIndex + 0.5) * spacing;
      vec2 sampleUV = vec2(uvPix.x / uResolution.x, bandCenterY / uResolution.y);
      vec3 c = texture(uTex, sampleUV).rgb;
      float l = dot(c, vec3(0.299,0.587,0.114));
      float targetY = bandCenterY + (l - 0.5) * amplitude;
      float thickness = spacing * 0.35;
      float d = abs(uvPix.y - targetY);
      return d < thickness ? 1.0 : 0.0;
    }

    float asciiThreshold(vec2 rawPixel, float lum){
      vec2 cellFrac = fract(rawPixel / uCellSize);
      float charIndex = lum > 0.5 ? 1.0 : 0.0;
      vec2 atlasUV = vec2((charIndex + cellFrac.x) / 2.0, 1.0 - cellFrac.y);
      float g = texture(uGlyphTex, atlasUV).r;
      return g > 0.35 ? 1.0 : 0.0;
    }

    float crosshatchThreshold(vec2 uvPix, float lum){
      float spacing = uMatrixIdx==0 ? 3.0 : (uMatrixIdx==1 ? 5.0 : 8.0);
      float phase1 = mod(uvPix.x + uvPix.y, spacing) / spacing;
      float phase2 = mod(uvPix.x - uvPix.y, spacing) / spacing;
      float l1 = lum > phase1 ? 1.0 : 0.0;
      float l2 = lum > phase2 ? 1.0 : 0.0;
      return max(l1, l2);
    }

    float applyPattern(vec2 uvPix, vec2 cellPos, float lum, vec2 rawPixel){
      if(uPattern==0){
        float t = ditherThreshold(cellPos);
        return lum > t ? 1.0 : 0.0;
      } else if(uPattern==1){
        return halftoneThreshold(uvPix, lum);
      } else if(uPattern==2){
        return lineThreshold(uvPix, lum);
      } else if(uPattern==3){
        return noiseThreshold(uvPix, lum);
      } else if(uPattern==4){
        return contourThreshold(uvPix, lum);
      } else if(uPattern==5){
        return asciiThreshold(rawPixel, lum);
      } else {
        return crosshatchThreshold(uvPix, lum);
      }
    }

    void main(){
      vec2 pixelCoord = vUv * uResolution;
      vec2 cellPixel = floor(pixelCoord / uCellSize) * uCellSize;
      vec2 sampleUv = cellPixel / uResolution;
      vec3 color = texture(uTex, sampleUv).rgb;

      vec2 cellPos = floor(pixelCoord / uCellSize);
      float thresh = uThreshold / 100.0;

      if(uColorMode==0){
        float lum = dot(color, vec3(0.299,0.587,0.114)) + thresh;
        float on = applyPattern(cellPixel, cellPos, lum, pixelCoord);
        outColor = vec4(mix(uBg, uFg, on), 1.0);
      } else if(uColorMode==2){
        float lum = dot(color, vec3(0.299,0.587,0.114)) + thresh;
        float t = ditherThreshold(cellPos);
        float levels = float(uPaletteCount);
        float scaled = lum * levels + (t - 0.5);
        int idx = int(clamp(floor(scaled), 0.0, levels - 1.0));
        vec3 outc = uPalette[0];
        for(int i=0;i<4;i++){ if(i==idx) outc = uPalette[i]; }
        outColor = vec4(outc, 1.0);
      } else {
        float lr = color.r + thresh;
        float lg = color.g + thresh;
        float lb = color.b + thresh;
        float onR = applyPattern(cellPixel + vec2(1.5,0.0), cellPos, lr, pixelCoord);
        float onG = applyPattern(cellPixel, cellPos, lg, pixelCoord);
        float onB = applyPattern(cellPixel - vec2(1.5,0.0), cellPos, lb, pixelCoord);
        vec3 outc = vec3(
          mix(uBg.r, uFg.r, onR),
          mix(uBg.g, uFg.g, onG),
          mix(uBg.b, uFg.b, onB)
        );
        outColor = vec4(outc, 1.0);
      }
    }
  `;

  function compileShader(gl, type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  function initGL(){
    gl = glcanvas.getContext('webgl2', { preserveDrawingBuffer:true });
    if(!gl){ alert('WebGL2 not supported in this browser. Try updating Chrome/Edge/Firefox to a recent version.'); return; }

    const vs = compileShader(gl, gl.VERTEX_SHADER, VERT_SRC);
    const fs = compileShader(gl, gl.FRAGMENT_SHADER, FRAG_SRC);
    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if(!gl.getProgramParameter(program, gl.LINK_STATUS)){
      console.error(gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(program, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    // glyph atlas: left half = '0', right half = '1', white glyph on black
    const glyphCanvas = document.createElement('canvas');
    glyphCanvas.width = 128; glyphCanvas.height = 64;
    const gctx = glyphCanvas.getContext('2d');
    gctx.fillStyle = '#000'; gctx.fillRect(0,0,128,64);
    gctx.fillStyle = '#fff';
    gctx.font = 'bold 52px monospace';
    gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
    gctx.fillText('0', 32, 34);
    gctx.fillText('1', 96, 34);
    glyphTexture = gl.createTexture();
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, glyphTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, glyphCanvas);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.activeTexture(gl.TEXTURE0);

    uniforms = {
      uTex: gl.getUniformLocation(program, 'uTex'),
      uGlyphTex: gl.getUniformLocation(program, 'uGlyphTex'),
      uResolution: gl.getUniformLocation(program, 'uResolution'),
      uCellSize: gl.getUniformLocation(program, 'uCellSize'),
      uThreshold: gl.getUniformLocation(program, 'uThreshold'),
      uMatrixIdx: gl.getUniformLocation(program, 'uMatrixIdx'),
      uPattern: gl.getUniformLocation(program, 'uPattern'),
      uColorMode: gl.getUniformLocation(program, 'uColorMode'),
      uFg: gl.getUniformLocation(program, 'uFg'),
      uBg: gl.getUniformLocation(program, 'uBg'),
      uTime: gl.getUniformLocation(program, 'uTime'),
      uPalette: gl.getUniformLocation(program, 'uPalette'),
      uPaletteCount: gl.getUniformLocation(program, 'uPaletteCount'),
    };
  }

  let startTime = performance.now();
  function render(){
    requestAnimationFrame(render);
    if(!gl || !streamReady) return;

    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);

    gl.viewport(0, 0, glcanvas.width, glcanvas.height);
    gl.uniform1i(uniforms.uTex, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, glyphTexture);
    gl.uniform1i(uniforms.uGlyphTex, 1);
    gl.activeTexture(gl.TEXTURE0);
    gl.uniform2f(uniforms.uResolution, glcanvas.width, glcanvas.height);
    gl.uniform1f(uniforms.uCellSize, state.cellSize);
    gl.uniform1f(uniforms.uThreshold, state.threshold);
    gl.uniform1i(uniforms.uMatrixIdx, state.matrixIdx);
    gl.uniform1i(uniforms.uPattern, state.pattern);
    gl.uniform1i(uniforms.uColorMode, state.colorMode);
    gl.uniform3f(uniforms.uFg, state.fg[0], state.fg[1], state.fg[2]);
    gl.uniform3f(uniforms.uBg, state.bg[0], state.bg[1], state.bg[2]);
    gl.uniform1f(uniforms.uTime, (performance.now()-startTime)/1000.0);
    const paletteFlat = new Float32Array(12);
    for(let i=0;i<4;i++){
      const c = state.palette[i] || [1,1,1];
      paletteFlat[i*3] = c[0]; paletteFlat[i*3+1] = c[1]; paletteFlat[i*3+2] = c[2];
    }
    gl.uniform3fv(uniforms.uPalette, paletteFlat);
    gl.uniform1i(uniforms.uPaletteCount, state.paletteCount);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // ---------- camera ----------
  let mediaStream = null;
  let currentFacingMode = 'user';
  async function startCamera(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: true
      });
      mediaStream = stream;
      video.srcObject = stream;
      await video.play();
      glcanvas.width = video.videoWidth || 640;
      glcanvas.height = video.videoHeight || 480;
      streamReady = true;
      placeholder.style.display = 'none';
      initGL();
      render();
    } catch(err){
      // retry video-only if mic permission was the blocker
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        mediaStream = stream;
        video.srcObject = stream;
        await video.play();
        glcanvas.width = video.videoWidth || 640;
        glcanvas.height = video.videoHeight || 480;
        streamReady = true;
        placeholder.style.display = 'none';
        initGL();
        render();
      } catch(err2){
        placeholder.querySelector('div').textContent = 'CAMERA ACCESS DENIED\n' + err2.message;
      }
    }
  }
  startBtn.addEventListener('click', startCamera);

  // ---------- floating panel system (preset dropdown + pattern/adjust/color) ----------
  const panelPattern = document.getElementById('panelPattern');
  const panelAdjust = document.getElementById('panelAdjust');
  const panelColor = document.getElementById('panelColor');
  const fabPreset = document.getElementById('fabPreset');
  const fabPattern = document.getElementById('fabPattern');
  const fabAdjust = document.getElementById('fabAdjust');
  const fabColor = document.getElementById('fabColor');

  function closeAllPanels(){
    document.querySelectorAll('.panel-section.open').forEach(p => p.classList.remove('open'));
    presetDropdown.classList.remove('open');
    document.querySelectorAll('.fab-btn.active').forEach(b => b.classList.remove('active'));
  }

  function togglePanel(panelEl, fabBtn){
    const wasOpen = panelEl.classList.contains('open');
    closeAllPanels();
    if(!wasOpen){
      panelEl.classList.add('open');
      if(fabBtn) fabBtn.classList.add('active');
    }
  }

  function togglePresetDropdown(){
    const wasOpen = presetDropdown.classList.contains('open');
    closeAllPanels();
    if(!wasOpen){
      presetDropdown.classList.add('open');
      fabPreset.classList.add('active');
    }
  }

  fabPreset.addEventListener('click', togglePresetDropdown);
  fabPattern.addEventListener('click', () => togglePanel(panelPattern, fabPattern));
  fabAdjust.addEventListener('click', () => togglePanel(panelAdjust, fabAdjust));
  fabColor.addEventListener('click', () => togglePanel(panelColor, fabColor));

  document.addEventListener('click', (e) => {
    const insideFab = document.getElementById('fabStack').contains(e.target);
    const insidePreset = presetDropdown.contains(e.target);
    const insideOpenPanel = e.target.closest('.panel-section.open');
    if(!insideFab && !insidePreset && !insideOpenPanel) closeAllPanels();
  });

  // ---------- camera flip (mobile) ----------
  const flipCameraBtn = document.getElementById('flipCameraBtn');
  flipCameraBtn.addEventListener('click', async () => {
    if(!streamReady) return;
    const previousFacing = currentFacingMode;
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode, width:{ ideal:640 }, height:{ ideal:480 } },
        audio: true
      });
      mediaStream = stream;
      video.srcObject = stream;
      await video.play();
      glcanvas.width = video.videoWidth || 640;
      glcanvas.height = video.videoHeight || 480;
    } catch(err){
      currentFacingMode = previousFacing;
      console.error('Camera flip failed:', err);
    }
  });

  // ---------- capture ----------
  document.getElementById('captureBtn').addEventListener('click', () => {
    if(!streamReady) return;
    const link = document.createElement('a');
    link.download = 'dithercam_' + Date.now() + '.png';
    link.href = glcanvas.toDataURL('image/png');
    link.click();
  });

  // ---------- record ----------
  let mediaRecorder, chunks = [], recording = false;
  const recordBtn = document.getElementById('recordBtn');
  recordBtn.addEventListener('click', () => {
    if(!streamReady) return;
    if(!recording){
      chunks = [];
      const canvasStream = glcanvas.captureStream(30);
      const audioTracks = mediaStream ? mediaStream.getAudioTracks() : [];
      const combined = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);
      const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
      mediaRecorder = new MediaRecorder(combined, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type:'video/webm' });
        const link = document.createElement('a');
        link.download = 'dithercam_' + Date.now() + '.webm';
        link.href = URL.createObjectURL(blob);
        link.click();
      };
      mediaRecorder.start();
      recording = true;
      recordBtn.querySelector('.btn-label').textContent = 'Stop & Save';
      recordBtn.classList.add('active');
      statusbar.classList.add('is-recording');
      recLabel.textContent = 'REC';
    } else {
      mediaRecorder.stop();
      recording = false;
      recordBtn.querySelector('.btn-label').textContent = 'Record WebM';
      recordBtn.classList.remove('active');
      statusbar.classList.remove('is-recording');
      recLabel.textContent = 'STANDBY';
    }
  });
})();
</script>
</body>
</html>
